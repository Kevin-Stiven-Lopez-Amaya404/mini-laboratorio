name: Validate SQL

on:
  pull_request:
    branches:
      - main
      - qa
      - dev
    paths:
      - '01_ddl/**'
      - '02_dml/**'
      - '03_dcl/**'
      - '04_tcl/**'
      - '05_rollbacks/**'
      - '**.sql'
      - '**.yaml'

jobs:
  check-branch-hierarchy:
    name: Validate branch hierarchy
    runs-on: ubuntu-latest

    steps:
      - name: Check allowed branch flow
        run: |
          SOURCE="${{ github.head_ref }}"
          TARGET="${{ github.base_ref }}"

          echo "PR: $SOURCE → $TARGET"

          # Jerarquía permitida
          if [ "$TARGET" = "main" ] && [ "$SOURCE" != "qa" ]; then
            echo "❌ Only 'qa' can merge into 'main'. Got: '$SOURCE'"
            exit 1
          fi

          if [ "$TARGET" = "qa" ] && [ "$SOURCE" != "dev" ]; then
            echo "❌ Only 'dev' can merge into 'qa'. Got: '$SOURCE'"
            exit 1
          fi

          if [ "$TARGET" = "dev" ]; then
            echo "❌ PRs targeting 'dev' are not allowed through this workflow."
            exit 1
          fi

          echo "✅ Branch flow '$SOURCE → $TARGET' is valid."

  lint-sql:
    name: Lint SQL (sqlfluff)
    runs-on: ubuntu-latest
    needs: check-branch-hierarchy  # ← no corre si la jerarquía falla

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install sqlfluff
        run: pip install sqlfluff

      - name: Run SQL linter
        run: |
          sqlfluff lint \
            --dialect postgres \
            --templater raw \
            01_ddl/ 02_dml/ 03_dcl/ 04_tcl/ 05_rollbacks/ \
            || true

  syntax-check:
    name: PostgreSQL syntax check
    runs-on: ubuntu-latest
    needs: check-branch-hierarchy  # ← no corre si la jerarquía falla

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ci_db
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed SQL files in PR
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            01_ddl/**
            02_dml/**
            03_dcl/**
            04_tcl/**
            05_rollbacks/**
            **.sql

      - name: Validate syntax of changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          PGPASSWORD: ci_password
        run: |
          echo "SQL files to validate:"
          echo "${{ steps.changed-files.outputs.all_changed_files }}"

          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "→ Validating: $file"
            psql -h localhost -U ci_user -d ci_db \
              -c "BEGIN; \i $file; ROLLBACK;" \
              || { echo "ERROR in $file"; exit 1; }
          done

          echo "All scripts passed syntax validation."

  summary:
    name: Validation summary
    runs-on: ubuntu-latest
    needs: [check-branch-hierarchy, lint-sql, syntax-check]
    if: always()

    steps:
      - name: Report result
        run: |
          if [ "${{ needs.check-branch-hierarchy.result }}" = "success" ] && \
             [ "${{ needs.lint-sql.result }}" = "success" ] && \
             [ "${{ needs.syntax-check.result }}" = "success" ]; then
            echo "✅ All checks passed. Ready for review."
          else
            echo "❌ One or more checks failed. Review the errors above."
            exit 1
          fi